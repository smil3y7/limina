<style>
:root {
  --bg: #0c0d0f;
  --bg2: #111318;
  --bg3: #181b22;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.07);
  --border-active: rgba(180,165,210,0.35);
  --text-primary: #e8e4de;
  --text-secondary: rgba(232,228,222,0.5);
  --text-tertiary: rgba(232,228,222,0.28);
  --accent: #b4a5d2;
  --accent2: #8fa8c8;
  --accent-glow: rgba(180,165,210,0.15);
  --warm: #c9a87c;
  --radius: 16px;
  --radius-sm: 10px;
  --transition: 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
}

[data-theme="light"] {
  --bg: #f5f3ef;
  --bg2: #edeae4;
  --bg3: #e4e0d8;
  --surface: rgba(0,0,0,0.04);
  --surface-hover: rgba(0,0,0,0.07);
  --border: rgba(0,0,0,0.08);
  --border-active: rgba(100,80,160,0.3);
  --text-primary: #1c1a18;
  --text-secondary: rgba(28,26,24,0.55);
  --text-tertiary: rgba(28,26,24,0.3);
  --accent: #6450a0;
  --accent2: #3d6a9a;
  --accent-glow: rgba(100,80,160,0.1);
  --warm: #8a6030;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
  overflow-x: hidden;
}

/* Ambient background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(80,60,140,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(50,80,130,0.07) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
  transition: opacity var(--transition);
}
[data-theme="light"] body::before {
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(100,80,180,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(50,80,160,0.05) 0%, transparent 60%);
}

/* Layout */
.app {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* Header */
header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 40px 0 60px;
}

.brand {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.brand-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 300;
  letter-spacing: 0.18em;
  color: var(--text-primary);
}

.brand-tagline {
  font-size: 11px;
  letter-spacing: 0.22em;
  color: var(--text-tertiary);
  text-transform: uppercase;
}

.header-controls {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-top: 6px;
}

.ctrl-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  border-radius: 8px;
  padding: 7px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.25s ease;
}
.ctrl-btn:hover {
  background: var(--surface-hover);
  color: var(--text-primary);
  border-color: var(--border-active);
}
.ctrl-btn.active {
  color: var(--accent);
  border-color: var(--border-active);
  background: var(--accent-glow);
}

/* Intro text */
.intro {
  margin-bottom: 56px;
}

.intro-eyebrow {
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.intro-headline {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px, 5vw, 50px);
  font-weight: 300;
  line-height: 1.2;
  color: var(--text-primary);
  margin-bottom: 18px;
}

.intro-headline em {
  font-style: italic;
  color: var(--accent);
}

.intro-body {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text-secondary);
  max-width: 520px;
}

/* Now playing bar */
.now-playing {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 48px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  transition: all var(--transition);
}

.now-playing.hidden { display: none; }

.np-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.np-info {}
.np-label {
  font-size: 10px;
  letter-spacing: 0.25em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.np-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 400;
  color: var(--text-primary);
}
.np-duration-label {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 2px;
}

.np-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

.np-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all 0.2s;
  flex-shrink: 0;
}
.np-btn:hover {
  border-color: var(--border-active);
  color: var(--text-primary);
  background: var(--surface-hover);
}
.np-btn.play-btn {
  width: 44px;
  height: 44px;
  background: var(--accent-glow);
  border-color: var(--border-active);
  color: var(--accent);
}
.np-btn.play-btn:hover {
  background: rgba(180,165,210,0.25);
}
.np-btn svg { pointer-events: none; }

/* Progress */
.np-progress {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.progress-track {
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 1px;
  width: 0%;
  transition: width 0.5s linear;
}
.progress-animated .progress-fill {
  animation: progressPulse 3s ease-in-out infinite alternate;
}
@keyframes progressPulse {
  from { opacity: 0.6; }
  to { opacity: 1; }
}
.np-time {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-tertiary);
}

/* Volume */
.np-bottom {
  display: flex;
  align-items: center;
  gap: 10px;
}
.vol-label {
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.08em;
  min-width: 50px;
}
.vol-slider {
  -webkit-appearance: none;
  appearance: none;
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  outline: none;
  flex: 1;
  cursor: pointer;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  transition: transform 0.2s;
}
.vol-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }

/* Section heading */
.section-heading {
  margin-bottom: 24px;
}
.section-eyebrow {
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 400;
  color: var(--text-secondary);
}

/* Programs grid */
.programs {
  display: grid;
  grid-template-columns: 1fr;
  gap: 2px;
  margin-bottom: 56px;
}

.program-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 28px 24px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
  position: relative;
  overflow: hidden;
  margin-bottom: 2px;
}

.program-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.3s;
  border-radius: 2px 0 0 2px;
}

.program-card:hover {
  background: var(--surface-hover);
  border-color: var(--border-active);
  transform: translateX(3px);
}

.program-card:hover::before { opacity: 0.6; }

.program-card.active {
  background: var(--accent-glow);
  border-color: var(--border-active);
}
.program-card.active::before { opacity: 1; }

.pc-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}

.pc-left { flex: 1; }

.pc-number {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-tertiary);
  margin-bottom: 5px;
}

.pc-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 400;
  color: var(--text-primary);
  line-height: 1.2;
}

.pc-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-tertiary);
  flex-shrink: 0;
  margin-left: 16px;
  font-size: 15px;
  transition: all 0.3s;
}
.program-card:hover .pc-icon, .program-card.active .pc-icon {
  border-color: var(--border-active);
  color: var(--accent);
  background: var(--accent-glow);
}

.pc-desc {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-secondary);
  margin-bottom: 18px;
}

.pc-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.pc-durations {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.dur-pill {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--text-tertiary);
  cursor: pointer;
  transition: all 0.2s;
  background: none;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.05em;
}
.dur-pill:hover, .dur-pill.active {
  border-color: var(--border-active);
  color: var(--accent);
  background: var(--accent-glow);
}

.pc-play-hint {
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.1em;
}
.program-card.active .pc-play-hint {
  color: var(--accent);
}

/* Session timer display */
.np-session-info {
  display: flex;
  gap: 20px;
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.08em;
}
.np-session-info span { color: var(--accent); }

/* Expanded program detail */
.program-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.4s ease;
  opacity: 0;
}
.program-detail.open {
  max-height: 300px;
  opacity: 1;
}
.program-detail-inner {
  padding-top: 16px;
  border-top: 1px solid var(--border);
  margin-top: 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.pd-col {}
.pd-label {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  margin-bottom: 5px;
}
.pd-value {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
}
.pd-tone {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.tone-tag {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--text-tertiary);
}

/* Footer */
footer {
  border-top: 1px solid var(--border);
  padding-top: 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-weight: 300;
  letter-spacing: 0.15em;
  color: var(--text-tertiary);
}
.footer-note {
  font-size: 11px;
  color: var(--text-tertiary);
  max-width: 300px;
  text-align: right;
  line-height: 1.6;
}

/* Waveform visualizer */
.waveform {
  display: flex;
  align-items: center;
  gap: 2px;
  height: 20px;
}
.wave-bar {
  width: 2px;
  background: var(--accent);
  border-radius: 1px;
  opacity: 0.5;
  transition: height 0.1s;
}
.playing .wave-bar {
  animation: waveAnim 1.2s ease-in-out infinite;
  opacity: 0.8;
}
.wave-bar:nth-child(1) { animation-delay: 0s; height: 4px; }
.wave-bar:nth-child(2) { animation-delay: 0.1s; height: 8px; }
.wave-bar:nth-child(3) { animation-delay: 0.2s; height: 14px; }
.wave-bar:nth-child(4) { animation-delay: 0.15s; height: 10px; }
.wave-bar:nth-child(5) { animation-delay: 0.05s; height: 6px; }
@keyframes waveAnim {
  0%, 100% { transform: scaleY(0.4); }
  50% { transform: scaleY(1); }
}

/* Breathing guide */
.breath-guide {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 30px;
  margin-top: 12px;
}
.breath-guide.visible { display: flex; }
.breath-circle {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--accent);
  animation: breathe 8s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1.3); opacity: 1; }
  60% { transform: scale(1.3); opacity: 1; }
}
.breath-text {
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 0.06em;
}

/* ── Onboarding headphone banner ── */
.hp-banner {
  background: var(--surface);
  border: 1px solid var(--border-active);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 48px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  animation: fadeUp 0.6s cubic-bezier(0.25,0.46,0.45,0.94) both;
  animation-delay: 0.1s;
}
.hp-banner.hidden { display: none; }
.hp-banner-top {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.hp-banner-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--accent-glow);
  border: 1px solid var(--border-active);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  flex-shrink: 0;
}
.hp-banner-text {}
.hp-banner-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 400;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.hp-banner-body {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-secondary);
}
.hp-banner-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.hp-btn-primary {
  background: var(--accent-glow);
  border: 1px solid var(--border-active);
  color: var(--accent);
  border-radius: 8px;
  padding: 8px 18px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.2s;
}
.hp-btn-primary:hover { background: rgba(180,165,210,0.25); }
.hp-btn-ghost {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-tertiary);
  border-radius: 8px;
  padding: 8px 18px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.2s;
}
.hp-btn-ghost:hover { border-color: var(--border-active); color: var(--text-secondary); }

/* ── Headphone test overlay ── */
.hp-overlay {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}
.hp-overlay.visible {
  opacity: 1;
  pointer-events: all;
}
.hp-overlay-bg {
  position: absolute;
  inset: 0;
  background: rgba(12,13,15,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
[data-theme="light"] .hp-overlay-bg {
  background: rgba(245,243,239,0.88);
}
.hp-modal {
  position: relative;
  z-index: 1;
  background: var(--bg3);
  border: 1px solid var(--border-active);
  border-radius: var(--radius);
  padding: 36px 32px;
  max-width: 420px;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.hp-modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 400;
  color: var(--text-primary);
  letter-spacing: 0.04em;
}
.hp-step { display: none; flex-direction: column; gap: 16px; }
.hp-step.active { display: flex; }

/* Step 1 */
.hp-step-label {
  font-size: 10px;
  letter-spacing: 0.25em;
  color: var(--text-tertiary);
  text-transform: uppercase;
}
.hp-step-desc {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-secondary);
}

/* Step 2 — stereo visualizer */
.hp-stereo {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}
.hp-stereo-field {
  width: 100%;
  height: 48px;
  border: 1px solid var(--border);
  border-radius: 30px;
  position: relative;
  overflow: hidden;
  background: var(--surface);
}
.hp-stereo-dot {
  position: absolute;
  top: 50%;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  transform: translateY(-50%);
  transition: left 1.2s cubic-bezier(0.45,0.05,0.55,0.95);
  box-shadow: 0 0 12px var(--accent);
  left: 8%;
}
.hp-stereo-label {
  font-size: 13px;
  color: var(--text-secondary);
  text-align: center;
  min-height: 20px;
  transition: opacity 0.3s;
}
.hp-stereo-lr {
  display: flex;
  justify-content: space-between;
  width: 100%;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-tertiary);
}

/* Step 3 */
.hp-result-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.hp-tips {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.hp-tips-title {
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.hp-tip {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.6;
  padding-left: 12px;
  position: relative;
}
.hp-tip::before {
  content: '·';
  position: absolute;
  left: 0;
  color: var(--accent);
}
.hp-success {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--accent-glow);
  border: 1px solid var(--border-active);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--accent);
}
.hp-modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: none;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  padding: 4px;
  transition: color 0.2s;
}
.hp-modal-close:hover { color: var(--text-primary); }

@media (max-width: 480px) {
  .hp-modal { padding: 28px 20px; }
}

/* ── Header headphone check button ── */
.ctrl-btn-icon {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  border-radius: 8px;
  padding: 7px 10px;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ctrl-btn-icon:hover {
  background: var(--surface-hover);
  color: var(--text-primary);
  border-color: var(--border-active);
}
.ctrl-btn-icon.highlight {
  color: var(--accent);
  border-color: var(--border-active);
  background: var(--accent-glow);
}
.ctrl-btn-icon svg { pointer-events: none; display: block; }

/* ── Onboarding banner ── */
.mini-player {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 200;
  display: flex;
  justify-content: center;
  pointer-events: none;
  transform: translateY(-100%);
  transition: transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94);
}
.mini-player.visible {
  transform: translateY(0);
  pointer-events: all;
}
.mini-player-inner {
  width: 100%;
  max-width: 900px;
  margin: 0 24px;
  background: var(--bg3);
  border: 1px solid var(--border-active);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
}
[data-theme="light"] .mini-player-inner {
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
}
.mp-waveform {
  display: flex;
  align-items: center;
  gap: 2px;
  height: 16px;
  flex-shrink: 0;
}
.mp-waveform .wave-bar {
  width: 2px;
  background: var(--accent);
  border-radius: 1px;
  opacity: 0.5;
}
.mp-waveform.playing .wave-bar {
  animation: waveAnim 1.2s ease-in-out infinite;
  opacity: 0.8;
}
.mp-info {
  flex: 1;
  min-width: 0;
}
.mp-label {
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--text-tertiary);
  text-transform: uppercase;
}
.mp-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 400;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.mp-progress {
  flex: 1;
  max-width: 200px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.mp-track {
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  overflow: hidden;
  cursor: pointer;
}
.mp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 1px;
  width: 0%;
  transition: width 0.5s linear;
}
.mp-time {
  font-size: 10px;
  color: var(--text-tertiary);
  text-align: right;
}
.mp-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.mp-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all 0.2s;
  flex-shrink: 0;
}
.mp-btn:hover {
  border-color: var(--border-active);
  color: var(--text-primary);
}
.mp-btn.mp-play {
  background: var(--accent-glow);
  border-color: var(--border-active);
  color: var(--accent);
}
.mp-btn.mp-play:hover { background: rgba(180,165,210,0.25); }
.mp-btn svg { pointer-events: none; }
.mp-scroll-hint {
  font-size: 10px;
  color: var(--text-tertiary);
  letter-spacing: 0.1em;
  cursor: pointer;
  flex-shrink: 0;
  transition: color 0.2s;
}
.mp-scroll-hint:hover { color: var(--accent); }

@media (max-width: 600px) {
  .mini-player-inner { margin: 0 12px; padding: 8px 14px; }
  .mp-progress { display: none; }
  .mp-scroll-hint { display: none; }
}

/* Notification/toast */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg3);
  border: 1px solid var(--border-active);
  border-radius: 30px;
  padding: 10px 22px;
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 0.08em;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
  pointer-events: none;
  z-index: 100;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Mobile */
@media (max-width: 600px) {
  .app { padding: 0 16px 60px; }
  header { padding: 24px 0 40px; }
  .program-detail-inner { grid-template-columns: 1fr; }
  footer { flex-direction: column; gap: 12px; align-items: flex-start; }
  .footer-note { text-align: left; }
  .np-session-info { flex-wrap: wrap; }
}

/* Fade in */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.app > * {
  animation: fadeUp 0.7s cubic-bezier(0.25,0.46,0.45,0.94) both;
}
header { animation-delay: 0s; }
.intro { animation-delay: 0.08s; }
.now-playing { animation-delay: 0.12s; }
.section-heading { animation-delay: 0.16s; }
.programs { animation-delay: 0.2s; }
</style>
</head>
<body>

<!-- Sticky Mini Player -->
<div class="mini-player" id="miniPlayer">
  <div class="mini-player-inner">
    <div class="mp-waveform" id="mpWaveform">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    <div class="mp-info">
      <div class="mp-label" data-t="nowPlayingLabel"></div>
      <div class="mp-title" id="mpTitle">—</div>
    </div>
    <div class="mp-progress">
      <div class="mp-track" onclick="seekMiniProgress(event)">
        <div class="mp-fill" id="mpFill"></div>
      </div>
      <div class="mp-time" id="mpTime">0:00</div>
    </div>
    <div class="mp-controls">
      <button class="mp-btn mp-play" onclick="togglePlay()">
        <svg id="mpPlayIcon" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="mp-btn" onclick="stopSession()">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
      </button>
    </div>
    <div class="mp-scroll-hint" onclick="scrollToPlayer()" data-t="miniScrollHint"></div>
  </div>
</div>

<div class="app">

  <header>
    <div class="brand">
      <div class="brand-name">LIMINA</div>
      <div class="brand-tagline"><span style="opacity:0.4;letter-spacing:0.15em">SENTRIA</span> &nbsp;·&nbsp; <span data-t="tagline"></span></div>
    </div>
    <div class="header-controls">
      <button class="ctrl-btn-icon" id="hpCheckHeaderBtn" onclick="openHpTest()" title="">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
          <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="langToggle" onclick="toggleLang()"></button>
      <button class="ctrl-btn" id="themeToggle" onclick="toggleTheme()"></button>
    </div>
  </header>

  <div class="intro">
    <div class="intro-eyebrow" data-t="introEyebrow"></div>
    <h1 class="intro-headline" data-t-html="introHeadline"></h1>
    <p class="intro-body" data-t="introBody"></p>
  </div>

  <!-- Headphone onboarding banner -->
  <div class="hp-banner hidden" id="hpBanner">
    <div class="hp-banner-top">
      <div class="hp-banner-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
          <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
        </svg>
      </div>
      <div class="hp-banner-text">
        <div class="hp-banner-title" data-t="hpOnboardTitle"></div>
        <div class="hp-banner-body" data-t="hpOnboardBody"></div>
      </div>
    </div>
    <div class="hp-banner-actions">
      <button class="hp-btn-primary" onclick="openHpTest(true)" data-t="hpOnboardTest"></button>
      <button class="hp-btn-ghost" onclick="dismissBanner()" data-t="hpOnboardSkip"></button>
    </div>
  </div>

  <!-- Now Playing -->
  <div class="now-playing hidden" id="nowPlaying">
    <div class="np-top">
      <div class="np-info">
        <div class="np-label" data-t="nowPlayingLabel"></div>
        <div class="np-title" id="npTitle">—</div>
        <div class="np-duration-label" id="npDurationLabel"></div>
      </div>
      <div class="np-controls">
        <div class="waveform" id="waveform">
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
        </div>
        <button class="np-btn" onclick="skipBack()" title="Restart">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
          </svg>
        </button>
        <button class="np-btn play-btn" id="playBtn" onclick="togglePlay()">
          <svg id="playIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <button class="np-btn" onclick="stopSession()" title="Stop">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        </button>
      </div>
    </div>

    <div class="np-progress">
      <div class="progress-track" onclick="seekProgress(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="np-time">
        <span id="timeElapsed">0:00</span>
        <span id="timeTotal">—</span>
      </div>
    </div>

    <div class="np-bottom">
      <span class="vol-label" data-t="volumeLabel"></span>
      <input class="vol-slider" type="range" min="0" max="1" step="0.01" value="0.75" id="volSlider" oninput="setVolume(this.value)">
    </div>

    <div class="breath-guide" id="breathGuide">
      <div class="breath-circle"></div>
      <div class="breath-text" data-t="breathText"></div>
    </div>
  </div>

  <!-- Programs -->
  <div class="section-heading">
    <div class="section-eyebrow" data-t="programsEyebrow"></div>
    <div class="section-title" data-t="programsTitle"></div>
  </div>

  <div class="programs" id="programsContainer"></div>

  <footer>
    <div class="footer-brand">LIMINA <span style="opacity:0.35;font-size:12px;letter-spacing:0.1em">/ SENTRIA</span></div>
    <div class="footer-note" data-t="footerNote"></div>
  </footer>

</div>

<!-- Headphone test overlay -->
<div class="hp-overlay" id="hpOverlay">

// ── Noise buffer (stereo, longer loop = less audible repetition) ──
function createNoiseBuffer(ctx, color) {
  const secs = 12; // 12s buffer — long enough loop is imperceptible
  const bufSize = ctx.sampleRate * secs;
  const buf = ctx.createBuffer(2, bufSize, ctx.sampleRate);

  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    if (color === 'white') {
      for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;
    } else if (color === 'pink') {
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for (let i = 0; i < bufSize; i++) {
        const w = Math.random() * 2 - 1;
        b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
        b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
        b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
        d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*(1/6.5);
        b6=w*0.115926;
      }
    } else { // brown
      let last = 0;
      for (let i = 0; i < bufSize; i++) {
        const w = Math.random() * 2 - 1;
        d[i] = (last + (0.02 * w)) / 1.02;
        last = d[i];
        d[i] *= 3.5;
      }
    }
  }
  return buf;
}

// ── Synthetic reverb via feedback delay network ──
function createReverb(ctx, decay, wet) {
  const convolver = ctx.createConvolver();
  const rate = ctx.sampleRate;
  const length = rate * decay;
  const impulse = ctx.createBuffer(2, length, rate);
  for (let ch = 0; ch < 2; ch++) {
    const d = impulse.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.5);
    }
  }
  convolver.buffer = impulse;

  const wetGain = ctx.createGain();
  wetGain.gain.value = wet;
  const dryGain = ctx.createGain();
  dryGain.gain.value = 1 - wet * 0.5;

  // Return a simple wrapper
  return { convolver, wetGain, dryGain };
}

// ── Main audio start ──
function startAudio(programIndex, durationSeconds) {
  stopAudio();
  const ctx = getAudioContext();
  const cfg = programAudioConfig[programIndex];
  const dur = durationSeconds || 2700;
  const vol = parseFloat(document.getElementById('volSlider').value);
  const now = ctx.currentTime;

  const nodes = { master: null, sources: [], lfos: [] };

  // Master gain with slow fade-in
  const master = ctx.createGain();
  master.gain.setValueAtTime(0.0001, now);
  master.gain.exponentialRampToValueAtTime(vol, now + 4);
  master.connect(ctx.destination);
  nodes.master = master;

  // Reverb bus
  const rev = createReverb(ctx, cfg.reverb.decay, cfg.reverb.wet);
  rev.convolver.connect(rev.wetGain);
  rev.wetGain.connect(master);
  // Dry bus goes direct to master

  // ── Binaural beats ──
  const merger = ctx.createChannelMerger(2);
  merger.connect(master);

  const leftOsc = ctx.createOscillator();
  leftOsc.type = 'sine';
  leftOsc.frequency.value = cfg.binauralBase;
  const leftG = ctx.createGain();
  leftG.gain.value = cfg.binauralGain;
  leftOsc.connect(leftG);
  leftG.connect(merger, 0, 0);

  const rightOsc = ctx.createOscillator();
  rightOsc.type = 'sine';
  rightOsc.frequency.setValueAtTime(cfg.binauralBase + cfg.binauralStart, now);
  rightOsc.frequency.linearRampToValueAtTime(cfg.binauralBase + cfg.binauralEnd, now + dur);
  const rightG = ctx.createGain();
  rightG.gain.value = cfg.binauralGain;
  rightOsc.connect(rightG);
  rightG.connect(merger, 0, 1);

  leftOsc.start(now); rightOsc.start(now);
  nodes.sources.push(leftOsc, rightOsc);

  // ── Ambient drones ──
  cfg.drones.forEach((d, i) => {
    const osc = ctx.createOscillator();
    osc.type = d.type;
    osc.frequency.value = d.freq;

    // Amplitude LFO (breath)
    const ampLFO = ctx.createOscillator();
    ampLFO.type = 'sine';
    ampLFO.frequency.value = d.lfoRate;
    const ampLFOGain = ctx.createGain();
    ampLFOGain.gain.value = d.gain * d.lfoDepth;
    ampLFO.connect(ampLFOGain);

    const droneGain = ctx.createGain();
    droneGain.gain.value = d.gain;
    ampLFOGain.connect(droneGain.gain);

    // Lowpass filter with slow LFO sweep
    const lpf = ctx.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.value = cfg.filterLFO.base;
    lpf.Q.value = 1.2;

    const filterLFO = ctx.createOscillator();
    filterLFO.type = 'sine';
    filterLFO.frequency.value = cfg.filterLFO.rate + i * 0.012;
    const filterLFOGain = ctx.createGain();
    filterLFOGain.gain.value = cfg.filterLFO.depth;
    filterLFO.connect(filterLFOGain);
    filterLFOGain.connect(lpf.frequency);

    // Stereo pan
    const panner = ctx.createStereoPanner();
    panner.pan.value = d.pan;

    osc.connect(lpf);
    lpf.connect(droneGain);
    droneGain.connect(panner);
    panner.connect(rev.dryGain); // dry path
    panner.connect(rev.convolver); // wet path

    osc.start(now);
    ampLFO.start(now);
    filterLFO.start(now);
    nodes.sources.push(osc);
    nodes.lfos.push(ampLFO, filterLFO);
  });

  // Dry gain to master
  rev.dryGain.connect(master);

  // ── Filtered noise ──
  const noiseBuf = createNoiseBuffer(ctx, cfg.noise.color);
  const noiseSource = ctx.createBufferSource();
  noiseSource.buffer = noiseBuf;
  noiseSource.loop = true;

  // Noise filter with LFO sweep
  const noiseFilter = ctx.createBiquadFilter();
  noiseFilter.type = 'lowpass';
  noiseFilter.frequency.value = cfg.noise.cutoff;
  noiseFilter.Q.value = 0.7;

  const noiseLFO = ctx.createOscillator();
  noiseLFO.type = 'sine';
  noiseLFO.frequency.value = cfg.noise.lfoRate;
  const noiseLFOGain = ctx.createGain();
  noiseLFOGain.gain.value = cfg.noise.lfoDepth;
  noiseLFO.connect(noiseLFOGain);
  noiseLFOGain.connect(noiseFilter.frequency);

  const noiseGain = ctx.createGain();
  noiseGain.gain.value = cfg.noise.gain;

  noiseSource.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(rev.convolver);
  noiseGain.connect(master);

  noiseSource.start(now);
  noiseLFO.start(now);
  nodes.sources.push(noiseSource);
  nodes.lfos.push(noiseLFO);

  // ── Optional shimmer layer (Lucid Preparation) ──
  if (cfg.shimmer) {
    const shimOsc = ctx.createOscillator();
    shimOsc.type = 'sine';
    shimOsc.frequency.value = cfg.shimmer.freq;
    const shimFilter = ctx.createBiquadFilter();
    shimFilter.type = 'bandpass';
    shimFilter.frequency.value = 800;
    shimFilter.Q.value = 2;
    const shimGain = ctx.createGain();
    shimGain.gain.value = cfg.shimmer.gain;
    // Slow AM on shimmer
    const shimLFO = ctx.createOscillator();
    shimLFO.type = 'sine';
    shimLFO.frequency.value = 0.15;
    const shimLFOG = ctx.createGain();
    shimLFOG.gain.value = cfg.shimmer.gain * 0.5;
    shimLFO.connect(shimLFOG);
    shimLFOG.connect(shimGain.gain);
    shimOsc.connect(shimFilter);
    shimFilter.connect(shimGain);
    shimGain.connect(master);
    shimOsc.start(now);
    shimLFO.start(now);
    nodes.sources.push(shimOsc);
    nodes.lfos.push(shimLFO);
  }

  sessionNodes = nodes;
}

function stopAudio() {
  if (!sessionNodes || !sessionNodes.master) return;
  try {
    const now = audioCtx ? audioCtx.currentTime : 0;
    // Fade out fast
    if (audioCtx) {
      sessionNodes.master.gain.cancelScheduledValues(now);
      sessionNodes.master.gain.setValueAtTime(sessionNodes.master.gain.value, now);
      sessionNodes.master.gain.linearRampToValueAtTime(0.0001, now + 0.3);
    }
    // Stop all sources immediately after short fade
    const allNodes = [
      ...(sessionNodes.sources || []),
      ...(sessionNodes.lfos || [])
    ];
    const stopAt = audioCtx ? audioCtx.currentTime + 0.35 : 0;
    allNodes.forEach(function(n) {
      try { n.stop(stopAt); } catch(e) {}
    });
    // Disconnect master after fade
    setTimeout(function() {
      try { sessionNodes.master.disconnect(); } catch(e) {}
    }, 400);
  } catch(e) {}
  sessionNodes = {};
}

function setVolume(val) {
  if (sessionNodes.master && audioCtx) {
    const now = audioCtx.currentTime;
    sessionNodes.master.gain.cancelScheduledValues(now);
    sessionNodes.master.gain.setValueAtTime(sessionNodes.master.gain.value, now);
    sessionNodes.master.gain.linearRampToValueAtTime(parseFloat(val), now + 0.3);
  }
}

// ============================================================
// SESSION MANAGEMENT
// ============================================================
function parseDuration(dur, programIndex) {
  const t = T[lang];
  if (typeof dur === 'number') return dur * 60;
  // Special modes
  if (dur.includes('∞') || dur === t.durationInfinite || dur === '∞ Loop' || dur === '∞ Zanka') return null; // infinite
  if (dur.includes('Sleep') || dur === t.durationSleep || dur === 'Sleep mode' || dur === 'Način spanja') return 28800; // 8h
  if (dur.includes('Wake') || dur === t.durationWake || dur === 'Wake mode' || dur === 'Način prebujanja') return 900; // 15min
  if (dur.includes('Focus') || dur === t.durationFocus || dur === 'Focus mode' || dur === 'Način fokusa') return 1500; // 25min
  return 1800;
}

function formatTime(sec) {
  if (sec === null || sec === undefined) return '∞';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function startSession() {
  if (activeProgram === null) return;
  const prog = T[lang].programs[activeProgram];
  sessionDuration = selectedDuration;
  sessionStartTime = Date.now();
  isPlaying = true;

  // Always resume context — handles browser autoplay policy
  const ctx = getAudioContext();
  ctx.resume().then(function() {
    startAudio(activeProgram, sessionDuration);
  });

  updatePlayBtn();
  updateProgress();

  clearInterval(progressInterval);
  progressInterval = setInterval(function() {
    if (!isPlaying) return;
    updateProgress();
    if (sessionDuration !== null) {
      const elapsed = (Date.now() - sessionStartTime) / 1000;
      if (elapsed >= sessionDuration) endSession();
    }
  }, 500);

  document.getElementById('waveform').classList.add('playing');
  showBreathGuide(prog.breath);
  showToast(T[lang].toastStarted);
}

function endSession() {
  isPlaying = false;
  clearInterval(progressInterval);
  stopAudio();
  updatePlayBtn();
  document.getElementById('waveform').classList.remove('playing');
  document.getElementById('progressFill').style.width = '100%';
  showBreathGuide(false);
}

function togglePlay() {
  if (!isPlaying) {
    if (activeProgram === null) return;
    if (sessionStartTime) {
      // Resume
      const ctx = getAudioContext();
      if (ctx.state === 'suspended') ctx.resume();
      isPlaying = true;
      startAudio(activeProgram, sessionDuration);
      document.getElementById('waveform').classList.add('playing');
      clearInterval(progressInterval);
      progressInterval = setInterval(() => {
        if (!isPlaying) return;
        updateProgress();
        if (sessionDuration !== null) {
          const elapsed = (Date.now() - sessionStartTime) / 1000;
          if (elapsed >= sessionDuration) endSession();
        }
      }, 500);
    } else {
      startSession();
    }
  } else {
    isPlaying = false;
    document.getElementById('waveform').classList.remove('playing');
    if (audioCtx) audioCtx.suspend();
    clearInterval(progressInterval);
  }
  updatePlayBtn();
}

function stopSession() {
  if (activeProgram === null) return;
  sessionStartTime = null;
  endSession();
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('timeElapsed').textContent = '0:00';
  document.getElementById('timeTotal').textContent = sessionDuration ? formatTime(sessionDuration) : '∞';
  showToast(T[lang].toastStopped);
}

function skipBack() {
  sessionStartTime = Date.now();
  if (isPlaying) {
    stopAudio();
    startAudio(activeProgram, sessionDuration);
  }
  document.getElementById('progressFill').style.width = '0%';
  showToast(T[lang].toastRestarted);
}

function seekProgress(e) {
  if (!sessionDuration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const seekTo = sessionDuration * ratio;
  sessionStartTime = Date.now() - seekTo * 1000;
  updateProgress();
}

function updateProgress() {
  if (!sessionStartTime) return;
  const elapsed = (Date.now() - sessionStartTime) / 1000;
  document.getElementById('timeElapsed').textContent = formatTime(Math.min(elapsed, sessionDuration || Infinity));
  if (sessionDuration) {
    const pct = Math.min((elapsed / sessionDuration) * 100, 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('timeTotal').textContent = formatTime(sessionDuration);
  } else {
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('timeTotal').textContent = '∞';
  }
  updateMiniPlayer();
}

function updatePlayBtn() {
  const icon = document.getElementById('playIcon');
  if (isPlaying) {
    icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  } else {
    icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
  }
  updateMiniPlayer();
}

function showBreathGuide(visible) {
  const bg = document.getElementById('breathGuide');
  bg.classList.toggle('visible', !!visible);
}

// ============================================================
// PROGRAM SELECTION
// ============================================================
function selectProgram(index, card) {
  // Update active state
  document.querySelectorAll('.program-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');

  const wasActive = activeProgram === index;
  activeProgram = index;

  // Stop current session
  if (isPlaying) { endSession(); sessionStartTime = null; }

  // Default duration: first option
  const prog = T[lang].programs[index];
  const firstDur = prog.durations[0];
  selectedDuration = firstDur * 60;

  // Update pill selections
  card.querySelectorAll('.dur-pill').forEach((p, i) => {
    p.classList.toggle('active', i === 0);
  });

  // Update now playing UI
  const np = document.getElementById('nowPlaying');
  np.classList.remove('hidden');
  document.getElementById('npTitle').textContent = prog.name;
  document.getElementById('npDurationLabel').textContent = firstDur + ' ' + T[lang].min;
  document.getElementById('timeElapsed').textContent = '0:00';
  document.getElementById('timeTotal').textContent = formatTime(selectedDuration);
  document.getElementById('progressFill').style.width = '0%';
  sessionStartTime = null;

  // Toggle expansion
  if (expandedProgram !== null && expandedProgram !== index) {
    const prevDetail = document.getElementById('detail-' + expandedProgram);
    if (prevDetail) { prevDetail.classList.remove('open'); }
  }
  const detail = document.getElementById('detail-' + index);
  if (detail) {
    detail.classList.toggle('open');
    expandedProgram = detail.classList.contains('open') ? index : null;
  }

  // Update play hints
  document.querySelectorAll('.pc-play-hint').forEach((el, i) => {
    el.textContent = i === index ? T[lang].playHintActive : T[lang].playHintIdle;
  });

  // Auto-start — kratka zakasnitev da stari node-i prejmejo stop()
  setTimeout(function() { startSession(); }, 450);
}

function selectDuration(programIndex, value, isSpecial, btn) {
  // Stop session
  if (isPlaying) { endSession(); sessionStartTime = null; }
  selectedDuration = parseDuration(isSpecial ? value : parseInt(value), programIndex);

  // Update pill UI
  const card = document.querySelector('.program-card[data-index="' + programIndex + '"]');
  card.querySelectorAll('.dur-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');

  // Update np label
  const prog = T[lang].programs[programIndex];
  document.getElementById('npDurationLabel').textContent = isSpecial ? value : value + ' ' + T[lang].min;
  document.getElementById('timeElapsed').textContent = '0:00';
  document.getElementById('timeTotal').textContent = selectedDuration ? formatTime(selectedDuration) : '∞';
  document.getElementById('progressFill').style.width = '0%';
  sessionStartTime = null;

  setTimeout(function() { startSession(); }, 50);
}

// ============================================================
// RENDER
// ============================================================
function renderPrograms() {
  const container = document.getElementById('programsContainer');
  const progs = T[lang].programs;
  container.innerHTML = '';

  progs.forEach((prog, i) => {
    const isActive = activeProgram === i;
    const card = document.createElement('div');
    card.className = 'program-card' + (isActive ? ' active' : '');
    card.dataset.index = i;

    // Duration pills
    let pillsHTML = '';
    prog.durations.forEach((d, di) => {
      const isFirst = di === 0 && isActive;
      pillsHTML += `<button class="dur-pill${isFirst ? ' active' : ''}" onclick="event.stopPropagation(); selectDuration(${i}, '${d}', false, this)">${d} ${T[lang].min}</button>`;
    });
    if (prog.specialDurations) {
      prog.specialDurations.forEach(sd => {
        pillsHTML += `<button class="dur-pill" onclick="event.stopPropagation(); selectDuration(${i}, '${sd}', true, this)">${sd}</button>`;
      });
    }

    // Tone tags
    let toneHTML = prog.tone.map(t => `<span class="tone-tag">${t}</span>`).join('');

    card.innerHTML = `
      <div class="pc-top">
        <div class="pc-left">
          <div class="pc-number">${prog.number}</div>
          <div class="pc-name">${prog.name}</div>
        </div>
        <div class="pc-icon">${prog.icon}</div>
      </div>
      <div class="pc-desc">${prog.desc}</div>
      <div class="pc-bottom">
        <div class="pc-durations">${pillsHTML}</div>
        <div class="pc-play-hint">${isActive ? T[lang].playHintActive : T[lang].playHintIdle}</div>
      </div>
      <div class="program-detail${isActive && expandedProgram === i ? ' open' : ''}" id="detail-${i}">
        <div class="program-detail-inner">
          <div class="pd-col">
            <div class="pd-label">${T[lang].detailPurpose}</div>
            <div class="pd-value">${prog.purpose}</div>
          </div>
          <div class="pd-col">
            <div class="pd-label">${T[lang].detailTextures}</div>
            <div class="pd-value">${prog.textures}</div>
          </div>
          <div class="pd-col" style="grid-column: 1 / -1;">
            <div class="pd-label">${T[lang].detailTone}</div>
            <div class="pd-tone">${toneHTML}</div>
          </div>
        </div>
      </div>
    `;

    card.addEventListener('click', () => selectProgram(i, card));
    container.appendChild(card);
  });
}

function applyTranslations() {
  const t = T[lang];
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.dataset.t;
    if (t[key] !== undefined && typeof t[key] === 'string') el.textContent = t[key];
  });
  document.querySelectorAll('[data-t-html]').forEach(el => {
    const key = el.dataset.tHtml;
    if (t[key] !== undefined) el.innerHTML = t[key];
  });
  // Update button labels
  document.getElementById('langToggle').textContent = t.langToggle;
  document.getElementById('themeToggle').textContent = theme === 'dark' ? t.themeLight : t.themeDark;
  // Headphone button tooltip
  const hpBtn = document.getElementById('hpCheckHeaderBtn');
  if (hpBtn) hpBtn.title = t.hpCheckBtn;
  // Render tips if overlay open
  renderHpTips();
  // Update now playing if active
  if (activeProgram !== null) {
    const prog = t.programs[activeProgram];
    document.getElementById('npTitle').textContent = prog.name;
    document.getElementById('mpTitle').textContent = prog.name;
  }
}

// ============================================================
// MINI PLAYER — sticky scroll behaviour
// ============================================================
function updateMiniPlayer() {
  const mp = document.getElementById('miniPlayer');
  const np = document.getElementById('nowPlaying');
  if (!mp || !np) return;

  const npRect = np.getBoundingClientRect();
  const isNpVisible = npRect.bottom > 60; // still visible near top

  if (activeProgram !== null && !isNpVisible) {
    mp.classList.add('visible');
  } else {
    mp.classList.remove('visible');
  }

  // Sync title
  if (activeProgram !== null) {
    document.getElementById('mpTitle').textContent = T[lang].programs[activeProgram].name;
  }

  // Sync waveform animation
  const mpWave = document.getElementById('mpWaveform');
  mpWave.classList.toggle('playing', isPlaying);

  // Sync play icon
  const mpIcon = document.getElementById('mpPlayIcon');
  if (mpIcon) {
    if (isPlaying) {
      mpIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    } else {
      mpIcon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
    }
  }

  // Sync progress
  if (sessionStartTime && sessionDuration) {
    const elapsed = (Date.now() - sessionStartTime) / 1000;
    const pct = Math.min((elapsed / sessionDuration) * 100, 100);
    document.getElementById('mpFill').style.width = pct + '%';
    document.getElementById('mpTime').textContent = formatTime(Math.min(elapsed, sessionDuration));
  } else if (!sessionDuration && sessionStartTime) {
    document.getElementById('mpFill').style.width = '0%';
    document.getElementById('mpTime').textContent = '∞';
  }
}

function scrollToPlayer() {
  const np = document.getElementById('nowPlaying');
  if (np) np.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function seekMiniProgress(e) {
  if (!sessionDuration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const seekTo = sessionDuration * ratio;
  sessionStartTime = Date.now() - seekTo * 1000;
  updateProgress();
  updateMiniPlayer();
}

// Scroll listener
window.addEventListener('scroll', updateMiniPlayer, { passive: true });

function renderHpTips() {
  const tips = T[lang].hpTips;
  const list = document.getElementById('hpTipsList');
  list.innerHTML = tips.map(t => `<div class="hp-tip">${t}</div>`).join('');
}

function startHpTest() {
  showHpStep('hpStep2');
  stopHpAudio();
  runStereoTest();
}

function runStereoTest() {
  const ctx = getAudioContext();
  if (ctx.state === 'suspended') ctx.resume();

  const label = document.getElementById('hpStereoLabel');
  const dot = document.getElementById('hpDot');
  const t = T[lang];

  // Create stereo panner + oscillator
  function playTone(pan, onDone) {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = 220;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.3);
    g.gain.linearRampToValueAtTime(0, ctx.currentTime + 1.8);
    const panner = ctx.createStereoPanner ? ctx.createStereoPanner() : ctx.createPanner();
    if (panner.pan) panner.pan.value = pan;
    osc.connect(g); g.connect(panner); panner.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 2);
    hpTestNodes.osc = osc;
    hpTestNodes.g = g;
    setTimeout(onDone, 2200);
  }

  // LEFT
  label.textContent = t.hpStep2Left;
  dot.style.left = '8%';
  playTone(-1, () => {
    // RIGHT
    label.textContent = t.hpStep2Right;
    dot.style.left = '82%';
    playTone(1, () => {
      // BOTH
      label.textContent = t.hpStep2Both;
      dot.style.left = '46%';
      // Play both channels together
      const oscL = ctx.createOscillator();
      const oscR = ctx.createOscillator();
      oscL.type = oscR.type = 'sine';
      oscL.frequency.value = 220;
      oscR.frequency.value = 220;
      const gL = ctx.createGain(); gL.gain.value = 0.1;
      const gR = ctx.createGain(); gR.gain.value = 0.1;
      const panL = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
      const panR = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
      if (panL) { panL.pan.value = -1; panR.pan.value = 1; }
      oscL.connect(gL); gL.connect(panL || ctx.destination); if (panL) panL.connect(ctx.destination);
      oscR.connect(gR); gR.connect(panR || ctx.destination); if (panR) panR.connect(ctx.destination);
      oscL.start(); oscR.start();
      oscL.stop(ctx.currentTime + 2); oscR.stop(ctx.currentTime + 2);
      hpTestTimeout = setTimeout(() => {
        showHpStep('hpStep3');
      }, 2400);
    });
  });
}

function stopHpAudio() {
  try { if (hpTestNodes.osc) hpTestNodes.osc.stop(); } catch(e){}
  hpTestNodes = {};
}

function hpResult(ok) {
  if (ok) {
    localStorage.setItem('limina-hp-seen', '1');
    showHpStep('hpStep4ok');
  } else {
    renderHpTips();
    showHpStep('hpStep4fail');
  }
}

// ============================================================
// INIT
// ============================================================
function init() {
  document.documentElement.dataset.theme = theme;
  document.documentElement.lang = lang;
  renderPrograms();
  applyTranslations();
  initHpBanner();
}

init();
</script>
